<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>University Hub - Home</title>
<style>

/* ================= GLOBAL STYLES ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

html, body {
    height: 100%;
    overflow: hidden;
}

body {
    background: #f5f7fa;
    color: #333;
}

/* ================= NAVIGATION ================= */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 5%;
    background: linear-gradient(90deg,#ff6a00,#ffd500);
    color: white;
}

nav .logo {
    font-weight: 700;
    font-size: 22px;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
}

nav ul li {
    cursor: pointer;
    transition: 0.3s;
}

nav ul li:hover {
    color: #fffbe6;
}

/* ================= HERO SECTION ================= */
.hero {
    height: calc(100vh - 70px - 60px);
    background: url('https://images.unsplash.com/photo-1523580846011-d3a5bc25702b?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
    position: relative;
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.hero-content {
    position: relative;
    z-index: 2;
    max-width: 900px;
    padding: 20px;
}

.hero-content h1 {
    font-size: clamp(36px,6vw,60px);
    font-weight: 800;
    line-height: 1.2;
    background: linear-gradient(90deg,#ff6a00,#ffd500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero-content p {
    margin-top: 15px;
    font-size: 18px;
    color: #fffbe6;
}

/* ================= FOOTER ================= */
footer {
    height: 60px;
    background: #111;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
}

</style>
</head>
<body onload="checkLogin()">

<!-- ================= NAVIGATION ================= -->
<nav>
<div class="logo">University Hub</div>

<ul>
<li onclick="location.href='index.html'">Home</li>
<li onclick="location.href='dashboard.html'">Dashboard</li>
<li onclick="location.href='academic.html'">Academic</li>
<li onclick="location.href='cultural.html'">Cultural</li>
<li onclick="location.href='upcoming.html'">Upcoming</li>
<li onclick="location.href='profile.html'">Profile</li>
<li onclick="location.href='feedback.html'">Feedback</li>
<li onclick="location.href='register.html'">Register</li>
<li onclick="logoutUser()">Logout</li>
</ul>

</nav>

<!-- ================= HERO SECTION ================= -->
<section class="hero">
<div class="overlay"></div>
<div class="hero-content">
<h1>University Academic & Cultural Events Hub</h1>
<p>Connect. Participate. Earn badges. Celebrate campus life!</p>
</div>
</section>

<!-- ================= FOOTER ================= -->
<footer>
© 2026 University Hub
</footer>

<script src="script.js"></script>

</body>
</html>
